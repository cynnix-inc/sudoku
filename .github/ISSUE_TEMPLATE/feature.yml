name: Feature request
description: Propose a new feature or enhancement
title: "feat: <short summary>"
labels: ["feature"]
body:
  - type: input
    id: scope
    attributes:
      label: Scope / area
      placeholder: e.g., game, ui, performance
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be built and why?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bullet list of verifiable outcomes
  - type: textarea
    id: test
    attributes:
      label: Test plan / checklist
      description: Unit/E2E/manual checks expected


