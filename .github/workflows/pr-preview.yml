name: PR Preview (EAS Update)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  eas-update-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install EAS CLI
        run: pnpm dlx eas-cli@latest --help > /dev/null 2>&1 || true

      - name: Create EAS Update to preview channel
        working-directory: apps/app
        run: |
          npx expo install --check || true
          npx expo whoami || true
          npx eas update --auto --branch=preview --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" --non-interactive

      - name: Comment QR on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: eas-preview
          message: |
            Preview update published to `preview` channel.
            - Run the Expo Go app or a dev client and open the Updates tab.
            - Channel: `preview`
            
            You can also scan the QR in the EAS dashboard Releases page.


