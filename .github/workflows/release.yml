name: Release (Changesets)

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create or Update Version PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore(release): version packages"
          commit: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


