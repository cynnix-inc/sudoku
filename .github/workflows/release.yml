name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build:
        description: "Run EAS build matrix after release"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create release with Changesets
        uses: changesets/action@v1
        with:
          publish: pnpm -w changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  eas-update-production:
    needs: version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Trigger EAS Update to production channel
        working-directory: apps/app
        run: npx eas update --auto --branch=production --message "Release $GITHUB_SHA" --non-interactive

  eas-build:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build == 'true' }}
    needs: eas-update-production
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ios, android]
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: EAS Build
        working-directory: apps/app
        run: npx eas build --platform ${{ matrix.platform }} --profile production --non-interactive


