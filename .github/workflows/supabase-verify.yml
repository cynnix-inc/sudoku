name: Supabase Verify

on:
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: supabase-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    services:
      postgres:
        # Use official Postgres image; pgcrypto is available via bundled contrib
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (psql)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..60}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready" && break
            fi
            echo "Waiting for Postgres..."
            sleep 2
          done

      - name: Bootstrap stub auth schema for policy references
        # Our migrations reference auth.uid(), which exists on Supabase but not vanilla Postgres.
        # Create minimal stubs so policies compile in CI verification.
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/postgres" -v ON_ERROR_STOP=1 <<'SQL'
          create schema if not exists auth;
          create or replace function auth.uid() returns uuid language sql stable as $$
          select '00000000-0000-0000-0000-000000000000'::uuid;
          $$;
          SQL

      - name: Apply migrations to temporary DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: |
          supabase db push --db-url "$DATABASE_URL" --debug


