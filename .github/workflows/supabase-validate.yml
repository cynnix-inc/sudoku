name: supabase-validate

on:
  pull_request:
    branches: [staging]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-validate.yml"
  workflow_dispatch:

jobs:
  validate:
    name: Validate Supabase migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: supabase_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect migration changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            migs:
              - 'supabase/migrations/**'

      - name: Skip if no migration changes
        if: steps.changes.outputs.migs != 'true'
        run: echo "No migration changes; skipping."

      - name: Install Postgres client
        if: steps.changes.outputs.migs == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        if: steps.changes.outputs.migs == 'true'
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -U postgres; then exit 0; fi
            echo "Waiting for Postgres..."
            sleep 2
          done
          echo "Postgres did not become ready in time" >&2
          exit 1

      - name: Apply migrations into clean DB (fail on error)
        if: steps.changes.outputs.migs == 'true'
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: supabase_ci
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t files < <(find supabase/migrations -type f -name '*.sql' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .sql files found under supabase/migrations; skipping."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Applying $f"
            psql -v ON_ERROR_STOP=1 -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" -f "$f"
          done
