name: supabase-validate

on:
  pull_request:
    branches: [staging]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-validate.yml"

jobs:
  validate:
    name: Validate Supabase migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: |
          curl -L https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/supabase

      - name: Validate migrations (dry-run)
        run: |
          if [ -d "supabase/migrations" ]; then
            echo "Found migrations; running validate..."
            supabase migration list || true
          else
            echo "No migrations directory present; skipping."
          fi

      - name: Always succeed (non-blocking)
        run: echo "Non-blocking validation complete"
