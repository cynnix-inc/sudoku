# Run Supabase migrations on push to staging and main
# Uses supabase/setup-cli@v1 (keep updated to latest stable; e.g., v1.175.4 at time of writing)
# Selects project by branch using secrets: SUPABASE_PROJECT_REF_STAGING and SUPABASE_PROJECT_REF_PROD
# Docs: see `docs/db.md` for environments, required secrets, and promotion flow

name: Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches: [staging, main]

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      # Common
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      REF: ${{ github.ref_name == 'main' && secrets.SUPABASE_PROJECT_REF_PROD || secrets.SUPABASE_PROJECT_REF_STAGING }}
      # DB password per environment (create these two secrets)
      SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'main' && secrets.SUPABASE_DB_PASSWORD_PROD || secrets.SUPABASE_DB_PASSWORD_STAGING }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for scripts if needed)
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Login to Supabase (non-interactive)
        run: supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link project (non-interactive)
        # SUPABASE_DB_PASSWORD is read by the CLI to avoid prompts
        run: supabase link --project-ref "$REF"

      - name: Push migrations
        # Either rely on the link or pass --project-ref explicitly (both work)
        run: supabase db push --linked
