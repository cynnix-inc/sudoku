name: Tag and Release on main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Determine version change
        id: vers
        shell: bash
        run: |
          set -euo pipefail
          CURR=$(node -p "require('./package.json').version")
          PREV=""
          if [ -n "${{ github.event.before }}" ] && git cat-file -e "${{ github.event.before }}" 2>/dev/null; then
            PREV=$(git show "${{ github.event.before }}:package.json" | node -e "process.stdin.once('data',d=>{try{console.log(JSON.parse(d).version||'')}catch{console.log('')}})")
          fi

          CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" || true)
          echo "changed<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "curr=$CURR" >> $GITHUB_OUTPUT
          echo "prev=$PREV" >> $GITHUB_OUTPUT

          if echo "$CHANGED_FILES" | grep -q "^package.json$" && [ "$CURR" != "$PREV" ] && [ -n "$CURR" ]; then
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if bumped and missing
        if: steps.vers.outputs.bumped == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.vers.outputs.curr }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --refs origin "refs/tags/v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; skipping."
            exit 0
          fi
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.vers.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vers.outputs.curr }}
          generate_release_notes: true

