name: CI

on:
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript typecheck
        run: npm run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        env:
          CI: true
        run: npm test -- --ci --coverage

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        env:
          CI: true
        run: npm run build
      - name: Verify dependencies
        run: npm run verify:deps
      - name: Bundle size check
        run: npm run bundle:check
      - name: Security audit (high severity)
        run: npm audit --audit-level=high --omit=dev
