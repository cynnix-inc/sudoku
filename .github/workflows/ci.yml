name: CI

on:
  pull_request:
    branches: [main, staging, 'epic/**']
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies (with retries)
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 600000
          for i in 1 2 3; do
            npm ci && break || { echo "npm ci failed on attempt $i, retrying in $((i*10))s..."; sleep $((i*10)); }
          done
      - name: Run ESLint
        run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies (with retries)
        run: |
          npm config set fetch-retries 8
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 600000
          npm config set maxsockets 3
          for i in 1 2 3; do
            npm ci --no-audit --no-fund && break || { echo "npm ci failed on attempt $i, retrying in $((i*10))s..."; sleep $((i*10)); }
          done
      - name: Run TypeScript typecheck
        run: npm run typecheck

  test:
    name: test (unit/integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies (with retries)
        run: |
          npm config set fetch-retries 8
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 600000
          npm config set maxsockets 3
          for i in 1 2 3; do
            npm ci --no-audit --no-fund && break || { echo "npm ci failed on attempt $i, retrying in $((i*10))s..."; sleep $((i*10)); }
          done
      - name: Cache Jest cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/jest
          key: ${{ runner.os }}-jest-${{ hashFiles('package-lock.json') }}-v1
          restore-keys: |
            ${{ runner.os }}-jest-
      - name: Run tests (epic PRs without coverage)
        if: ${{ startsWith(github.base_ref, 'epic/') }}
        env:
          CI: true
          DISABLE_PERF_TESTS: 1
          EPIC_PR: 1
        run: npm test -- --ci --coverage=false
      - name: Run tests
        if: ${{ !startsWith(github.base_ref, 'epic/') }}
        env:
          CI: true
        run: npm test -- --ci --coverage

  test_bdd:
    name: test (BDD)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies (with retries)
        run: |
          npm config set fetch-retries 8
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 600000
          npm config set maxsockets 3
          for i in 1 2 3; do
            npm ci --no-audit --no-fund && break || { echo "npm ci failed on attempt $i, retrying in $((i*10))s..."; sleep $((i*10)); }
          done
      - name: Cache Jest cache (BDD)
        uses: actions/cache@v4
        with:
          path: ~/.cache/jest
          key: ${{ runner.os }}-jest-bdd-${{ hashFiles('package-lock.json') }}-v1
          restore-keys: |
            ${{ runner.os }}-jest-bdd-
      - name: Run BDD tests
        env:
          CI: true
        run: npm run test:bdd -- --ci

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect Node version from package.json engines (fallback 20.x)
        id: node
        run: |
          if command -v jq >/dev/null 2>&1; then
            NODE_VERSION=$(jq -r '.engines.node // empty' package.json || true)
          else
            NODE_VERSION=""
          fi
          if [ -z "$NODE_VERSION" ] || [ "$NODE_VERSION" = "null" ]; then
            echo "version=20.x" >> $GITHUB_OUTPUT
          else
            echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          fi
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: npm
      - name: Install dependencies (with retries)
        run: |
          npm config set fetch-retries 8
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-maxtimeout 600000
          npm config set maxsockets 3
          for i in 1 2 3; do
            npm ci --no-audit --no-fund && break || { echo "npm ci failed on attempt $i, retrying in $((i*10))s..."; sleep $((i*10)); }
          done
      - name: Build
        env:
          CI: true
        run: npm run build
      - name: Verify dependencies
        run: npm run verify:deps
      - name: Bundle size check
        run: npm run bundle:check
      - name: Security audit (high severity)
        run: npm audit --audit-level=high --omit=dev
