name: ci
on:
  pull_request:
  push:
    branches: [ main, rebuild/** ]
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Basic repo hygiene
        run: |
          echo "Running placeholder checks..."
          test -f .editorconfig || { echo ".editorconfig missing"; exit 1; }
          echo "OK"

