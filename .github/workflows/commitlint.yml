name: Commitlint

on:
  pull_request:
    branches: [staging, main]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Lint commit messages
        run: npx commitlint --from=origin/${{ github.base_ref }} --to=HEAD


