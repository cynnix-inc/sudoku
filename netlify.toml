[build]
  # Install deps and generate env.js + app version at build time
  command = "npm ci && npm run build:env && npm run build:version"
  # Deploy the repository root (index.html is at the root)
  publish = "."

[build.environment]
  # These keys must be client-visible for Supabase to work in the browser,
  # so instruct Netlify's secret scanner to ignore them and the generated file.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = "env.js"
  # NODE_VERSION = "20"


