# Netlify configuration
# Secrets and environment variables should be configured in the Netlify UI, not in this file.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
	# Ensure Netlify uses Node 20 to match local/CI
	NODE_VERSION = "20"

	# Netlify Secrets Scanning flags
	# The EXPO_PUBLIC_* variables are intentionally exposed to the client bundle.
	# Allowlist them so the scanner doesn't fail builds when their values appear in dist.
	SECRETS_SCAN_OMIT_KEYS = "EXPO_PUBLIC_SUPABASE_ANON_KEY,EXPO_PUBLIC_SUPABASE_URL"

# Production context for main branch
[context.production]
  command = "npm run build"
  publish = "dist"

# Staging context for staging branch
[context.staging]
  command = "npm run build"
  publish = "dist"
  # This context applies to the 'staging' branch name
  # Netlify uses branch deploys for non-production branches by default.


# Ensure SPA routing works on Netlify by redirecting all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


# Lighthouse plugin with performance budgets (non-fatal thresholds)
[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "lighthouse"

  [plugins.inputs.thresholds]
    performance = 0.90
    accessibility = 0.90
    "best-practices" = 0.90
    seo = 0.90


